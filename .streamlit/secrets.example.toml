[connections.snowflake]
account = "org-account"
user = "app-user"
password = "replace-with-pat"
role = "APP_ROLE"
warehouse = "APP_WH"
database = "ECON_AGENT_DB"
schema = "ANALYTICS"

[cortex_analyst]
semantic_view = "ECON_AGENT_DB.ANALYTICS.ECON_AGENT_DB_ANALYTICS"

[app]
model = "mistral-large2"
daily_allowance = 50
session_allowance = 5
max_question_chars = 1000
max_prompt_tokens = 3000
max_output_tokens = 1000
max_concurrent_requests = 2
data_cache_ttl_seconds = 600
connection_ttl_seconds = 3600
quota_table = "ECON_AGENT_DB.ANALYTICS.APP_DAILY_QUOTA"
