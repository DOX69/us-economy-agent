<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="400" viewBox="0 0 1200 400"
     role="img" aria-labelledby="title desc">
  <title id="title">US Economy Agent</title>
  <desc id="desc">Ask the US economy plain-English questions and get grounded answers from live BLS and Freddie Mac data via Snowflake Cortex and Dynamic Tables.</desc>

  <defs>
    <linearGradient id="spark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34D399" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" rx="24" fill="#0B1220"/>

  <!-- Title block -->
  <g transform="translate(56 56)">
    <text x="0" y="0" fill="#5B9DFF" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="17" letter-spacing="1.5">SNOWFLAKE · CORTEX ANALYST · DYNAMIC TABLES</text>
    <text x="0" y="66" fill="#E6EDF3" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="54" font-weight="700">US Economy Agent</text>
    <text x="0" y="126" fill="#CBD5E1" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="25">Ask the US economy plain-English questions.</text>
    <text x="0" y="160" fill="#CBD5E1" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif"
          font-size="25">Get grounded answers from live economic data.</text>
    <text x="0" y="320" fill="#94A3B8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="15">Streamlit · Snowpark Python · Cortex COMPLETE</text>
  </g>

  <!-- Proof: live dashboard -->
  <g transform="translate(690 48)">
    <rect width="464" height="104" rx="14" fill="#131C2E" stroke="#1E2A3F"/>
    <text x="20" y="28" fill="#94A3B8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13">RECENT TREND · UNEMPLOYMENT RATE (20+ yrs)</text>
    <path d="M24,82 L84,74 L144,86 L204,66 L264,72 L324,58 L384,64 L444,50 L444,92 L24,92 Z"
          fill="url(#spark)"/>
    <polyline points="24,82 84,74 144,86 204,66 264,72 324,58 384,64 444,50"
          fill="none" stroke="#34D399" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  </g>

  <g transform="translate(690 176)">
    <g>
      <rect width="144" height="150" rx="12" fill="#131C2E" stroke="#1E2A3F"/>
      <text x="16" y="34" fill="#94A3B8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">UNEMPLOYMENT</text>
      <text x="16" y="86" fill="#E6EDF3" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="32" font-weight="700">4.1%</text>
      <text x="16" y="116" fill="#64748B" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">U-20+, monthly</text>
    </g>
    <g transform="translate(160 0)">
      <rect width="144" height="150" rx="12" fill="#131C2E" stroke="#1E2A3F"/>
      <text x="16" y="34" fill="#94A3B8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">CPI INDEX</text>
      <text x="16" y="86" fill="#E6EDF3" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="32" font-weight="700">314.2</text>
      <text x="16" y="116" fill="#64748B" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">1982-84 = 100</text>
    </g>
    <g transform="translate(320 0)">
      <rect width="144" height="150" rx="12" fill="#131C2E" stroke="#1E2A3F"/>
      <text x="16" y="34" fill="#94A3B8" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">30Y MORTGAGE</text>
      <text x="16" y="86" fill="#E6EDF3" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="32" font-weight="700">6.26%</text>
      <text x="16" y="116" fill="#64748B" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="12">Freddie Mac</text>
    </g>
  </g>
</svg>
